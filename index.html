<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WK Pronostiek 2026 | In Opbouw</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* Kleurenpalet variabelen */
        :root {
            --soft-cyan: #9CF6F6;
            --apricot-cream: #F3C98B;
            --light-bronze: #DAA588;
            --lobster-pink: #C46D5E;
            --vibrant-coral: #F56960;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            /* Bewegende gradient achtergrond met de warme kleuren */
            background: linear-gradient(-45deg, var(--apricot-cream), var(--light-bronze), var(--lobster-pink), var(--vibrant-coral));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
        }

        /* Achtergrond animatie */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism container */
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 4rem 5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 1.5s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            text-shadow: 2px 4px 6px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Pulserend accentlijntje met de Soft Cyan kleur */
        .accent-loader {
            display: inline-block;
            width: 60px;
            height: 4px;
            background: var(--soft-cyan);
            border-radius: 5px;
            box-shadow: 0 0 10px var(--soft-cyan);
            animation: pulse 2s infinite ease-in-out;
        }

        /* Fade-in animatie voor de container */
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Pulse animatie voor het lijntje */
        @keyframes pulse {
            0% { transform: scaleX(0.5); opacity: 0.6; }
            50% { transform: scaleX(1.5); opacity: 1; }
            100% { transform: scaleX(0.5); opacity: 0.6; }
        }

        /* Responsief voor mobiel */
        @media (max-width: 600px) {
            .container {
                padding: 2.5rem 2rem;
                width: 80%;
            }
            h1 {
                font-size: 2.2rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WK Pronostiek</h1>
        <p>Website in opbouw</p>
        <div class="accent-loader"></div>
    </div>

</body>
</html>
